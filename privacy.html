<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Songfeed Privacy</title>
        <style>
          * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
          }
          /* Fallback solid color for iOS overscroll zones */
          html {
            background-color: rgb(254, 48, 149);
          }
          body {
            min-height: 100vh;
            background: transparent;
            padding: 40px 20px;
            position: relative;
          }
          /* Fixed full-screen gradient that never moves */
          .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom right, rgb(255, 0, 138), rgb(253, 96, 160));
            z-index: -1;
          }
          .container {
            text-align: center;
            font-family: sans-serif;
            margin: auto;
            color: white;
            position: relative;
          }
          h1 {
            font-weight: 900;
            font-size: 40px;
            text-align: left;
            max-width: 600pt;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 12px;
          }
          ul, li, p {
            text-align: left;
            opacity: 0.9;
            font-size: 16pt;
            max-width: 600pt;
            font-weight: normal;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 32px;
          }
        </style>
    </head>
    <body>
      <div class="bg"></div>
      <div class="container">
        <h1>SongFeed App Privacy</h1>
        <p>We don't store any personally identifiable information outside of your device. (Such as Apple Music session details)</p>
        <h1>Tracking and Analytics</h1>
        <p>We don't do tracking and only use anonymous analytics to improve the app.</p>
      </div>
    </body>
</html>
